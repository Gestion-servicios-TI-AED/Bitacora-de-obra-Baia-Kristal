<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1B3A6B"/>
  <!-- Book spine -->
  <rect x="5" y="5" width="4" height="22" rx="2" fill="#0f2847"/>
  <!-- Book body -->
  <rect x="7" y="5" width="18" height="22" rx="2" fill="#2a5298"/>
  <!-- Text lines -->
  <rect x="11" y="10" width="10" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
  <rect x="11" y="14" width="10" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
  <rect x="11" y="18" width="7" height="1.5" rx="0.75" fill="white" opacity="0.85"/>
  <!-- Gold bookmark -->
  <polygon points="22,5 26,5 26,15 24,13 22,15" fill="#F5A623"/>
</svg>
