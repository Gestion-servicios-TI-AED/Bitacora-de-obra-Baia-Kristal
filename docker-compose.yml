services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/production.db
      JWT_SECRET: cambiar-por-secreto-seguro-en-produccion
      UPLOAD_DIR: /data/uploads
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
